name: release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.25.x"
      - run: go test ./...

  build:
    needs: test
    runs-on: ubuntu-latest
    strategy:
      matrix:
        goos: [linux]
        goarch: [amd64, arm64]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.25.x"
      - name: Build
        env:
          CGO_ENABLED: "1"
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
        run: |
          if [ "$GOARCH" = "arm64" ]; then
            sudo apt-get update
            sudo apt-get install -y gcc-aarch64-linux-gnu
            export CC=aarch64-linux-gnu-gcc
          fi
          go build -trimpath -ldflags="-s -w" -o goss ./cmd/goss
          tar -czf goss_${GOOS}_${GOARCH}.tar.gz goss scripts/install-panel.sh scripts/install-agent.sh
          sha256sum goss_${GOOS}_${GOARCH}.tar.gz > goss_${GOOS}_${GOARCH}.tar.gz.sha256
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: goss_${{ matrix.goos }}_${{ matrix.goarch }}
          path: |
            goss_${{ matrix.goos }}_${{ matrix.goarch }}.tar.gz
            goss_${{ matrix.goos }}_${{ matrix.goarch }}.tar.gz.sha256

  release:
    needs: build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true
      - uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/goss_linux_amd64.tar.gz
            dist/goss_linux_amd64.tar.gz.sha256
            dist/goss_linux_arm64.tar.gz
            dist/goss_linux_arm64.tar.gz.sha256
